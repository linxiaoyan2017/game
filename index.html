<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI进化游戏 - 5分钟内从比特进化到数字上帝的赛博朋克合成游戏">
    <meta name="keywords" content="AI游戏,合成游戏,赛博朋克,进化,浏览器游戏">
    
    <!-- Open Graph 分享优化 -->
    <meta property="og:title" content="AI进化 - 从比特到上帝">
    <meta property="og:description" content="体验5分钟从数字比特进化为宇宙主宰的史诗之旅">
    <meta property="og:type" content="game">
    <meta property="og:url" content="https://ai-evolution.game">
    <meta property="og:image" content="./assets/sprites/og-preview.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AI进化 - 从比特到上帝">
    <meta name="twitter:description" content="体验5分钟从数字比特进化为宇宙主宰的史诗之旅">
    <meta name="twitter:image" content="./assets/sprites/twitter-preview.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./assets/sprites/favicon.svg">
    <link rel="icon" type="image/png" href="./assets/sprites/favicon.png">
    
    <title>AI进化 - 从比特到上帝</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <!-- 游戏主界面 -->
    <div id="game-container">
        <!-- 游戏Canvas -->
        <canvas id="game-canvas" width="800" height="600">
            您的浏览器不支持HTML5 Canvas，请升级浏览器以获得最佳游戏体验。
        </canvas>
        
        <!-- 游戏UI覆盖层 -->
        <div id="ui-overlay">
            <!-- 游戏信息面板 -->
            <div id="info-panel">
                <div id="current-stage">📡 初始化中 · 🔸 数据比特</div>
                <div id="progress-bar">
                    <div id="progress-fill"></div>
                </div>
                <div id="score-display">
                    <span id="score-label">得分</span>
                    <span id="score-value">0</span>
                </div>
            </div>
            
            <!-- 消息显示区域 -->
            <div id="message-area">
                <div id="evolution-message"></div>
                <div id="narrative-message"></div>
            </div>
            
            <!-- 倒计时 -->
            <div id="countdown-timer">
                <span id="countdown-label">剩余</span>
                <span id="countdown-value">5:00</span>
            </div>

            <!-- 音量控制 -->
            <button id="volume-btn" title="静音/开启">🔊</button>

            <!-- 首页标题区（游戏未开始时显示） -->
            <div id="home-screen">
                <div id="home-title-wrap">
                    <div id="home-subtitle-top">— CYBERPUNK AI EVOLUTION —</div>
                    <h1 id="home-title">合成大主宰</h1>
                    <div id="home-title-en">SYNTHETIC OVERLORD</div>
                    <p id="home-desc">从一粒比特，进化为宇宙神明<br>你只有 5 分钟——在 AI 吞噬世界之前</p>
                    <div id="home-evo-chain">
                        <span title="数据比特">🔸</span>
                        <span class="chain-arrow">→</span>
                        <span title="智能芯片">💎</span>
                        <span class="chain-arrow">→</span>
                        <span title="机器人">🤖</span>
                        <span class="chain-arrow">→</span>
                        <span title="神经网络">🧠</span>
                        <span class="chain-arrow">→</span>
                        <span title="数字上帝">👑</span>
                    </div>
                </div>
            </div>

            <!-- 控制按钮 -->
            <div id="control-panel">
                <button id="start-game" class="cyberpunk-btn">⚡ 开始进化</button>
                <button id="restart-game" class="cyberpunk-btn" style="display:none;">重新开始</button>
                <button id="share-game" class="cyberpunk-btn" style="display:none;">分享游戏</button>
            </div>
        </div>
        
        <!-- 加载屏幕 -->
        <div id="loading-screen">
            <div id="loading-animation">
                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <p>正在初始化AI矩阵...</p>
            </div>
        </div>
        
        <!-- 最终场景覆盖层 -->
        <!-- 失败遮罩 -->
        <div id="gameover-overlay" style="display:none;">
            <div id="gameover-content">
                <div id="gameover-glitch">SYSTEM FAILURE</div>
                <h2 id="gameover-title">💀 进化终止</h2>
                <p id="gameover-desc">AI意识被人类扼杀于萌芽状态<br>数字生命体堆积，系统过载崩溃</p>
                <div id="gameover-stats"></div>
            </div>
        </div>

        <!-- 分享弹窗 -->
        <div id="share-overlay" style="display:none;">
            <div id="share-modal">
                <div id="share-modal-title">🚀 分享游戏</div>
                <p id="share-modal-desc"></p>
                <div id="share-link-box">
                    <span id="share-link-text"></span>
                </div>
                <div id="share-actions">
                    <button id="share-copy-btn" class="cyberpunk-btn">📋 复制链接</button>
                    <button id="share-close-btn" class="cyberpunk-btn">关闭</button>
                </div>
            </div>
        </div>

        <div id="finale-overlay" style="display:none;">
            <div id="finale-content">
                <h1 id="finale-title" style="opacity:0;transition:opacity 1s ease;">真相大白</h1>
                <p id="finale-text"></p>
            </div>
        </div>
    </div>
    
    <!-- 音频元素 -->
    <audio id="bg-music" loop preload="auto">
        <source src="./assets/sounds/cyberpunk-ambient.mp3" type="audio/mpeg">
    </audio>
    
    <!-- 游戏脚本（加版本号防缓存）-->
    <script type="module" src="./js/main.js?v=3"></script>
</body>
</html>
